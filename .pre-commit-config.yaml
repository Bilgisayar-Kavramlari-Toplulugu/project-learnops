repos:
  # ---------- Genel dosya hijyeni ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # ---------- Commit mesajı: Conventional Commits ----------
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.21.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]

  # ---------- Backend: Ruff (lint + format) ----------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ---------- Frontend: ESLint + Prettier ----------
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm --prefix frontend run lint -- .
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: npm --prefix frontend exec prettier -- --write frontend/
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css|md)$
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: poetry -C backend run mypy app/
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: tsc
        name: tsc --noEmit
        entry: npm --prefix frontend run type-check
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
