repos:
  # ---------- Genel dosya hijyeni ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # ---------- Commit mesajı: Conventional Commits ----------
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.21.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]

  # ---------- Backend: Ruff (lint + format) ----------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ---------- Frontend: ESLint + Prettier ----------
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && { [ -f node_modules/.package-lock.json ] || npm ci --silent; } && for f in "$@"; do npx eslint --fix "${f#frontend/}"; done' --
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$

      - id: prettier
        name: prettier
        entry: bash -c 'cd frontend && { [ -f node_modules/.package-lock.json ] || npm ci --silent; } && files=(); for f in "$@"; do files+=("${f#frontend/}"); done; npx prettier --write "${files[@]}"' --
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css|md)$
