name: "CI - Content Validation"

env:
    PYTHON_VERSION: "3.13.11"
    POETRY_VERSION: "2.3.2"

on:
    pull_request:
        branches:
            - develop
            - release
            - main
    workflow_dispatch:

defaults:
    run:
        working-directory: backend

jobs:
    validate-content:
        name: Validate Content & Quiz Dry-Run
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      content:
                        - "content/**"
                        - "backend/scripts/**"
                        - ".github/workflows/ci-content-validation.yaml"

            - uses: actions/setup-python@v6
              if: steps.filter.outputs.content == 'true'
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install Poetry
              if: steps.filter.outputs.content == 'true'
              run: pipx install poetry==${{ env.POETRY_VERSION }}

            - name: Install dependencies
              if: steps.filter.outputs.content == 'true'
              run: poetry install --no-interaction --no-ansi

            - name: Validate content files
              if: steps.filter.outputs.content == 'true'
              run: poetry run python scripts/validate_content.py

            - name: Quiz seed dry-run
              if: steps.filter.outputs.content == 'true'
              env:
                  ENVIRONMENT: "testing"
              run: poetry run python scripts/seed_quiz.py --env testing --dry-run

            - name: Skip - no content changes
              if: steps.filter.outputs.content != 'true'
              run: echo "No content changes detected, skipping validation"
