name: "Changelog oluştur ve Release yayınla"

on:
  push:
    tags:
      - "v*"

jobs:
  changelog:
    name: Changelog oluştur ve Release yayınla
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: git-cliff kur
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: CHANGELOG.md oluştur (git-cliff)
        run: |
          git-cliff --tag ${{ github.ref_name }} --latest -o CHANGELOG.md

      - name: GitHub Release oluştur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "LearnOps ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') }}