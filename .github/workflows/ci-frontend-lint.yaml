name: "CI - frontend Lint"

env:
    NODE_VERSION: "22"

on:
    pull_request:
        branches:
            - develop
            - release
            - main
    workflow_dispatch:

defaults:
    run:
        working-directory: frontend

jobs:
    lint:
        name: ESlint + TypeScript
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      frontend:
                        - "frontend/**"
                        - ".github/workflows/ci-frontend-lint.yaml"

            - uses: actions/setup-node@v6
              if: steps.filter.outputs.frontend == 'true'
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install Dependencies
              if: steps.filter.outputs.frontend == 'true'
              run: npm ci

            - name: Run ESlint
              if: steps.filter.outputs.frontend == 'true'
              run: npm run lint

            - name: Type check
              if: steps.filter.outputs.frontend == 'true'
              run: npx tsc --noEmit

            - name: Skip - no frontend changes
              if: steps.filter.outputs.frontend != 'true'
              run: echo "No frontend changes detected, skipping lint"
