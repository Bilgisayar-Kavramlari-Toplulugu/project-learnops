name: "CI - frontend Lint"

env:
    NODE_VERSION: "22"

on:
    push:
        branches:
            - develop
            - release
        paths:
            - "frontend/**"
            - ".github/workflows/ci-frontend-lint.yaml"
    pull_request:
        branches:
            - develop
            - release
            - main
        paths:
            - "frontend/**"
            - ".github/workflows/ci-frontend-lint.yaml"
    workflow_call:
    workflow_dispatch:

defaults:
    run:
        working-directory: frontend

jobs:
    lint:
        name: ESlint + TypeScript
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install Dependencies
              run: npm ci

            - name: Run ESlint
              run: npm run lint

            - name: Type check
              run: npx tsc --noEmit
