name: "CI Docker- Build"

on:
    pull_request:
        branches:
            - develop
            - release
            - main
        paths:
            - "backend/**"
            - "frontend/**"
            - ".github/workflows/ci-build.yaml"
    workflow_dispatch:

jobs:
    build:
        name: Docker Build
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read
        steps:
            - name: Checkout Code
              uses: actions/checkout@v6

            - name: changed files
              uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      backend:
                          - "backend/**"
                      frontend:
                          - "frontend/**"

            - name: Build Backend Docker image
              if: steps.filter.outputs.backend == 'true'
              run: docker build -t learnops:ci ./backend

            - name: Build Frontend Docker image
              if: steps.filter.outputs.frontend == 'true'
              run: docker build -t learnops:ci ./frontend
