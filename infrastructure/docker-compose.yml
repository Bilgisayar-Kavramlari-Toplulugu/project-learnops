services:
  db:
    image: postgres:17-alpine
    container_name: learnops_db
    env_file:
      - .env
    ports:
      - "${POSTGRES_HOST_FORWARD_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    container_name: learnops_backend
    env_file:
      - .env
    volumes:
      - ../backend:/app
      - backend_deps:/usr/local/lib/python3.13/site-packages
    ports:
      - "8000:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ../frontend
    container_name: learnops_frontend
    env_file:
      - .env
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_deps:
  frontend_node_modules:
  frontend_next:
