services:
  db:
    image: postgres:17-alpine
    container_name: learnops_db
    env_file:
      - .env
    ports:
      - "${POSTGRES_HOST_FORWARD_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learnops} -d ${POSTGRES_DB:-learnops}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ../../backend
    container_name: learnops_backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    env_file:
      - .env
    volumes:
      - ../../backend:/app
      # Host-side seed scripts (poetry run python scripts/seed_content.py)
      # için read-only mount — runtime'da FastAPI okumaz.
      - ../../content:/app/content:ro
      # Poetry ile kurulan paketleri container restart'lar arası önbelleğe alır.
      # Geliştirici Rehberi v2.0 / Bölüm 8.1 ile uyumlu — silmeyin.
      - backend_deps:/usr/local/lib/python3.13/site-packages
    ports:
      - "8000:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ../../frontend
    container_name: learnops_frontend
    command: ["npm", "run", "dev"]
    env_file:
      - .env
    volumes:
      - ../../frontend:/app
      # Frontend MDX dosyalarını sadece okur (getSectionContent, getAllSectionParams) —
      # least-privilege için read-only mount.
      - ../../content:/app/content:ro
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 400 ? 0 : 1))\""]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_deps:
  frontend_node_modules:
  frontend_next:
